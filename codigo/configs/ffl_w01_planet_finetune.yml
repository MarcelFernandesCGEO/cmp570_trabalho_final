# Focal Frequency Loss — Ablation variante A: loss_weight=0.1
# Projeto Final CMP570 — Fotografia Computacional — UFRGS 2026/1
# Parte do experimento: L1 + Perceptual + GAN + FFL(w=0.1)
#
# Retoma do checkpoint 9000 do CP06 (já fine-tuned Planet→Aerofoto).
# Objetivo: verificar se FFL com peso pequeno melhora reconstrução espectral
# sem prejudicar SSIM ou cPSNR.

name: ffl_w01_planet_finetune
model_type: SSRESRGANModel
scale: 4
num_gpu: auto
manual_seed: 0

l1_gt_usm: true
percep_gt_usm: true
gan_gt_usm: false

datasets:
  train:
    name: PlanetGT_train
    type: S2NAIPDataset
    sentinel2_path: /home/marcel/Desktop/anotacoes_mestrado_sr/checkpoints/checkpoint_06/finetune_data_tci/planet_chips
    naip_path: /home/marcel/Desktop/anotacoes_mestrado_sr/checkpoints/checkpoint_06/finetune_data_tci/gt_chips
    s2_bands: ['tci']
    n_s2_images: 16
    rand_crop: false
    use_hflip: true
    use_rot: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: PlanetGT_val
    type: S2NAIPDataset
    sentinel2_path: /home/marcel/Desktop/anotacoes_mestrado_sr/checkpoints/checkpoint_06/finetune_data_tci/planet_chips
    naip_path: /home/marcel/Desktop/anotacoes_mestrado_sr/checkpoints/checkpoint_06/finetune_data_tci/gt_chips
    s2_bands: ['tci']
    n_s2_images: 16
    rand_crop: false

network_g:
  type: SSR_RRDBNet
  num_in_ch: 48
  num_out_ch: 3
  num_feat: 64
  num_block: 23
  num_grow_ch: 32

network_d:
  type: SSR_UNetDiscriminatorSN
  num_in_ch: 3
  num_feat: 64
  skip_connection: true

path:
  pretrain_network_g: /home/marcel/Desktop/allenai/satlas-super-resolution/pretrained_models/esrgan_16S2.pth
  strict_load_g: false   # false: carrega pesos compatíveis, ignora conv_first (48ch vs 24ch)
  resume_state: /home/marcel/Desktop/anotacoes_mestrado_sr/checkpoints/checkpoint_06/experiments/esrgan_planet_finetune/training_states/9000.state
  experiments_root: /home/marcel/Desktop/cmp570/trabalhos/trabalho_final/results/ffl_w01

train:
  ema_decay: 0.999

  optim_g:
    type: Adam
    lr: !!float 5e-6   # lr reduzido: fine-tuning sobre fine-tuning
    weight_decay: 0
    betas: [0.9, 0.99]

  optim_d:
    type: Adam
    lr: !!float 5e-6
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [4000, 7000]
    gamma: 0.5

  total_iter: 9000   # rodar mais 9k iters (total acumulado: 18k)
  warmup_iter: -1

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_2': 0.1
      'conv2_2': 0.1
      'conv3_4': 1.0
      'conv4_4': 1.0
      'conv5_4': 1.0
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: !!float 1.0
    style_weight: 0
    range_norm: false
    criterion: l1

  gan_opt:
    type: GANLoss
    gan_type: vanilla
    real_label_val: 1.0
    fake_label_val: 0.0
    loss_weight: !!float 0.1

  # --- Focal Frequency Loss ---
  ffl_opt:
    type: FocalFrequencyLoss
    loss_weight: 0.1   # λ=0.1: peso pequeno para não dominar L1
    alpha: 1.0         # expoente focal: linear

  net_d_iters: 1
  net_d_init_iters: 0

val:
  val_freq: !!float 1e3
  save_img: false
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: false

logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
